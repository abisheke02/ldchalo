name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ── Build API ───────────────────────────────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify API can load
        working-directory: packages/api
        run: node --check src/index.js

  # ── Build web apps ──────────────────────────────────────────────────────────
  build-web:
    name: Build Web Apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [ld-exam-web, school-erp-web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }}
        run: npx turbo run build --filter=@school/${{ matrix.app }}
        env:
          VITE_API_URL: http://localhost:3000

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-dist
          path: apps/${{ matrix.app }}/dist
          retention-days: 7

  # ── Desktop app check ───────────────────────────────────────────────────────
  desktop-check:
    name: Desktop App Check
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download ld-exam-web dist
        uses: actions/download-artifact@v4
        with:
          name: ld-exam-web-dist
          path: apps/ld-exam-web/dist

      - name: Copy renderer bundle
        working-directory: desktop/ld-exam-desktop
        run: node scripts/build-renderer.js

      - name: Verify renderer output
        run: |
          test -f desktop/ld-exam-desktop/renderer/index.html
          echo "Renderer OK"

  # ── Docker build check ──────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    steps:
      - uses: actions/checkout@v4

      - name: Download ld-exam-web dist
        uses: actions/download-artifact@v4
        with:
          name: ld-exam-web-dist
          path: apps/ld-exam-web/dist

      - name: Download school-erp-web dist
        uses: actions/download-artifact@v4
        with:
          name: school-erp-web-dist
          path: apps/school-erp-web/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Nginx Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/nginx/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
