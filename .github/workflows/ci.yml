name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: web/package-lock.json }
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
        env:
          VITE_API_URL: /api
      - uses: actions/upload-artifact@v4
        with: { name: web-dist, path: web/dist, retention-days: 7 }

  check-api:
    name: Check API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: backend/package-lock.json }
      - run: npm install
        working-directory: backend
      - run: node --check src/index.js
        working-directory: backend

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-web, check-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: web-dist, path: web/dist }
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with: { context: ./backend, push: false, cache-from: 'type=gha', cache-to: 'type=gha,mode=max' }
      - name: Build Nginx image
        uses: docker/build-push-action@v5
        with: { context: ., file: infra/nginx/Dockerfile, push: false, cache-from: 'type=gha', cache-to: 'type=gha,mode=max' }
