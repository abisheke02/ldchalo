<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.ldschools.app;" />
  <title>LD Schools Exam</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4FF;color:#111827}
    #splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1565C0;gap:16px;transition:opacity .4s}
    #splash.hide{opacity:0;pointer-events:none}
    #splash-logo{font-size:64px}
    #splash-title{font-size:28px;font-weight:800;color:#fff}
    #splash-ver{font-size:13px;color:#90CAF9}
    #splash-spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="splash">
    <span id="splash-logo">📖</span>
    <span id="splash-title">LD Schools</span>
    <span id="splash-ver">Loading…</span>
    <div id="splash-spinner"></div>
  </div>
  <div id="root"></div>
  <script>
    (async()=>{
      if(window.electronAPI){
        const v=await window.electronAPI.getVersion().catch(()=>'');
        if(v)document.getElementById('splash-ver').textContent='v'+v;
        const url=await window.electronAPI.config.getApiUrl().catch(()=>null);
        if(url)window.__LDSCHOOLS_API_URL__=url;
      }
    })();
    window.addEventListener('app:ready',()=>{
      const s=document.getElementById('splash');
      if(s){s.classList.add('hide');setTimeout(()=>s.remove(),500)}
    });
  </script>
  <script type="module" src="./assets/index.js" onerror="document.getElementById('splash-ver').textContent='Run: npm run build:renderer';document.getElementById('splash-spinner').style.display='none'"></script>
</body>
</html>
