<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    CSP: script-src allows the bundled React app (hashed inline bootstrap only).
    The actual app JS/CSS files are loaded via relative paths below.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' https://api.ldexam.app https://*.supabase.co;" />
  <title>LD Exam</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F0F4FF;
      color: #111827;
    }

    /* Splash screen — shown until React mounts */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1565C0; gap: 20px;
      transition: opacity 0.4s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash-logo { font-size: 64px; }
    #splash-title { font-size: 28px; font-weight: 800; color: #fff; }
    #splash-version { font-size: 13px; color: #90CAF9; }
    #splash-spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Splash shown while React hydrates -->
  <div id="splash">
    <span id="splash-logo">📖</span>
    <span id="splash-title">LD Exam</span>
    <span id="splash-version">Loading…</span>
    <div id="splash-spinner"></div>
  </div>

  <!-- React app mounts here -->
  <div id="root"></div>

  <!--
    Bootstrap: wire up electronAPI config so the React app can read
    the API URL from the electron-store before Axios initialises.
  -->
  <script>
    (async () => {
      // Show app version in splash
      if (window.electronAPI) {
        const v = await window.electronAPI.getVersion().catch(() => '');
        document.getElementById('splash-version').textContent = v ? 'v' + v : '';
      }

      // Inject API URL into window so Vite env substitution picks it up at runtime
      if (window.electronAPI?.config) {
        const url = await window.electronAPI.config.getApiUrl().catch(() => null);
        if (url) window.__ELECTRON_API_URL__ = url;
      }
    })();

    // Hide splash once React signals it's ready (dispatched in App.jsx)
    window.addEventListener('app:ready', () => {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hide');
        setTimeout(() => splash.remove(), 500);
      }
    });
  </script>

  <!--
    The built React app. electron-builder copies apps/ld-exam-web/dist/*
    into renderer/ via the "extraResources" / "files" config, so the
    Vite-generated index.html overwrites this file during the build step.
    This file is the fallback shown if the web build is not yet embedded.
  -->
  <script type="module" src="./assets/index.js" onerror="
    document.getElementById('splash-version').textContent = 'Build not found — run: npm run build:renderer';
    document.getElementById('splash-spinner').style.display = 'none';
  "></script>
</body>
</html>
