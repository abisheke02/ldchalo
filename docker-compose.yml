# ─── docker-compose.yml ───────────────────────────────────────────────────────
# PostgreSQL and Redis are hosted on Neon + Upstash (cloud, free tier).
# Only the API + Nginx run locally via Docker.

services:

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: school_erp_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:       ${NODE_ENV:-development}
      PORT:           3000
      # ── Cloud DB connections (from .env) ─────────────────────────────────
      NEON_DB_URL:             ${NEON_DB_URL:?NEON_DB_URL required}
      MONGODB_URL:             ${MONGODB_URL:-}
      MONGODB_DB_NAME:         ${MONGODB_DB_NAME:-school_erp}
      UPSTASH_REDIS_URL:       ${UPSTASH_REDIS_URL:-}
      DATABRICKS_HOST:         ${DATABRICKS_HOST:-}
      DATABRICKS_TOKEN:        ${DATABRICKS_TOKEN:-}
      DATABRICKS_HTTP_PATH:    ${DATABRICKS_HTTP_PATH:-}
      DATABRICKS_CATALOG:      ${DATABRICKS_CATALOG:-hive_metastore}
      DATABRICKS_SCHEMA:       ${DATABRICKS_SCHEMA:-analytics}
      # ── App ──────────────────────────────────────────────────────────────
      JWT_SECRET:              ${JWT_SECRET:?JWT_SECRET required}
      ALLOWED_ORIGINS:         ${ALLOWED_ORIGINS:-http://localhost}
      ADMIN_USERNAME:          ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD:          ${ADMIN_PASSWORD:?ADMIN_PASSWORD required}
      # ── Third-party ───────────────────────────────────────────────────────
      ANTHROPIC_API_KEY:       ${ANTHROPIC_API_KEY:-}
      SUPABASE_URL:            ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY:    ${SUPABASE_SERVICE_KEY:-}
      FIREBASE_PROJECT_ID:     ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL:   ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY:    ${FIREBASE_PRIVATE_KEY:-}
      RAZORPAY_KEY_ID:         ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET:     ${RAZORPAY_KEY_SECRET:-}
      SMTP_HOST:               ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:               ${SMTP_PORT:-587}
      SMTP_USER:               ${SMTP_USER:-}
      SMTP_PASS:               ${SMTP_PASS:-}
      GOOGLE_CLOUD_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT_ID:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/ping || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── School ERP Web ──────────────────────────────────────────────────────────
  school-erp-web:
    build:
      context: ./apps/school-erp-web
      dockerfile: Dockerfile
    container_name: school_erp_web
    restart: unless-stopped
    depends_on:
      api: { condition: service_healthy }
    environment:
      VITE_API_URL: http://localhost:3000

  # ─── LD Exam Web ─────────────────────────────────────────────────────────────
  ld-exam-web:
    build:
      context: ./apps/ld-exam-web
      dockerfile: Dockerfile
    container_name: ld_exam_web
    restart: unless-stopped
    depends_on:
      api: { condition: service_healthy }
    environment:
      VITE_API_URL: http://localhost:3000

  # ─── Nginx (reverse proxy) ───────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    container_name: school_erp_nginx
    restart: unless-stopped
    depends_on:
      api: { condition: service_healthy }
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

# NOTE: No local postgres or redis volumes — databases are on Neon + Upstash
