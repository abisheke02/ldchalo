# ─── Nginx Reverse Proxy — School Platform ────────────────────────────────────
#
# Port layout (all internal — only 80/443 exposed externally):
#   backend (api)        → :3000
#   ld-exam-web          → :5173  (Vite dev) / served as static in prod
#   school-erp-web       → :5174  (Vite dev) / served as static in prod
#
# Routing rules:
#   /api/*               → backend:3000
#   /health              → backend:3000
#   /erp/*               → school-erp-web (or school-erp static)
#   /*                   → ld-exam-web (student portal — default)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  sendfile        on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;

  # ── Upstream definitions ────────────────────────────────────────────────────

  upstream api_backend {
    server api:3000;
    keepalive 16;
  }

  # ── Rate limiting zones ─────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;

  # ── Main server block (HTTP — redirect to HTTPS in production) ──────────────
  server {
    listen 80;
    server_name _;

    # Health check — no rate limit
    location = /health {
      proxy_pass http://api_backend/health;
      proxy_set_header Host $host;
      access_log off;
    }

    # ── API routes ─────────────────────────────────────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
      client_max_body_size 10m;
    }

    # ── School ERP web portal (/erp/*) ─────────────────────────────────────────
    location /erp/ {
      alias /usr/share/nginx/erp/;
      try_files $uri $uri/ /erp/index.html;
      expires 1h;
      add_header Cache-Control "public, must-revalidate";
    }

    # ── LD Exam web portal (default — catches everything else) ─────────────────
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      expires 1h;
      add_header Cache-Control "public, must-revalidate";
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|eot|ico)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
      access_log off;
    }
  }

  # ── HTTPS server block (uncomment and configure for production with SSL cert) ─
  # server {
  #   listen 443 ssl http2;
  #   server_name yourdomain.com;
  #
  #   ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #
  #   # Same location blocks as above
  # }
}
