# LDChalo — Nginx Reverse Proxy
# Single web app + unified API backend
# /api/* → api:3000    /* → web/dist static files

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;

  upstream api { server api:3000; keepalive 16; }

  limit_req_zone $binary_remote_addr zone=api:10m  rate=120r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;

  server {
    listen 80;
    server_name _;

    location = /ping   { proxy_pass http://api/ping;   access_log off; proxy_set_header Host $host; }
    location = /health { proxy_pass http://api/health; access_log off; proxy_set_header Host $host; }

    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      client_max_body_size 10m;
    }

    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      expires 1h;
      add_header Cache-Control "public, must-revalidate";
    }

    location ~* \.(js|css|png|jpg|svg|woff2?|ico)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
      access_log off;
    }
  }

  # Uncomment for SSL in production:
  # server {
  #   listen 443 ssl http2;
  #   server_name ldchalo.app;
  #   ssl_certificate     /etc/letsencrypt/live/ldchalo.app/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/ldchalo.app/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   # ... same location blocks as above
  # }
}
